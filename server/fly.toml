# Fly.io configuration for PRD Pipeline Backend
app = "prd-pipeline-api"
primary_region = "sjc"

[build]
  [build.args]
    NODE_VERSION = "20"

[env]
  NODE_ENV = "production"
  PORT = "8080"
  RIAN_API_BASE_URL = "https://api.rian.io/v1"
  SUPABASE_URL = "https://ivihmzkultzpmohjuvei.supabase.co"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"
    method = "GET"
    path = "/api/auth/me"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
