services:
  - type: web
    name: prd-ai
    runtime: node
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: OPENAI_API_KEY
        sync: false
      - key: RIAN_API_BASE_URL
        value: https://api.rian.io/v1
      - key: RIAN_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SUPABASE_URL
        value: https://ivihmzkultzpmohjuvei.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://prd-ai-api.onrender.com
      - key: FRONTEND_URL
        value: https://prd-ai-api.onrender.com
