services:
  # Single-service deployment: backend builds the frontend during npm install,
  # then serves it as static files. One Render Web Service, no separate
  # frontend host, no cross-origin CORS. Backend mounts /api/* routes; everything
  # else falls through to the React SPA's index.html.
  - type: web
    name: prd-ai
    runtime: node
    buildCommand: cd client && npm install --include=dev && npm run build && cd ../server && npm install
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Render assigns PORT automatically — don't override
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: RIAN_API_BASE_URL
        value: https://api.rian.io/v1
      - key: RIAN_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SUPABASE_URL
        value: https://jcjnhdxjaumnkazogaac.supabase.co
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: TEAMS_WEBHOOK_URL
        sync: false
      - key: CORS_ORIGIN
        value: https://prd-ai.onrender.com
      - key: FRONTEND_URL
        value: https://prd-ai.onrender.com
